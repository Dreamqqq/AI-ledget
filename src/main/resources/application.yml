# ?? ??
# 配置项目端口
server:
  port: 8084


spring:

  #配置项目返回时间的json格式
  jackson.date-format: yyyy-MM-dd HH:mm:ss
  jackson.time-zone: GMT+8

  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:mysql://localhost:3306/jizhang?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=GMT%2b8&allowPublicKeyRetrieval=true
    username: root
    password: your_mysql_password
    hikari:
      maximum-pool-size: 100 #?????,???10.
      minimum-idle: 10 #??????????10.
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true

  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    database: MYSQL
    show-sql: false
    properties:
      hibernate.id.new_generator_mappings: true
      hibernate.cache.use_query_cache: true
      hibernate.cache.use_second_level_cache: false
      hibernate.generate_statistics: false
      hibernate.cache.region.factory_class: org.hibernate.cache.jcache.internal.JCacheRegionFactory
      hibernate.cache.provider_configuration_file_resource_path: classpath:config/ehcache.xml

jwt:
  secret: ai-ledger-secret-key-must-be-at-least-256-bits-long-for-security
  expiration: 86400000

# 阿里云 OSS 配置
oss:
  endpoint: your-oss-endpoint
  accessKeyId: your-access-key-id
  accessKeySecret: your-access-key-secret
  bucketName: your-bucket-name

# OpenAI 配置
openai:
  apiKey: your-openai-api-key
  model: gpt-4-vision-preview
  apiUrl: https://api.openai.com/v1/chat/completions
